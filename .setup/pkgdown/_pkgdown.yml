destination: pkgdown
url: https://github.com/jeksterslab/manCTMed/

template:
  bootstrap: 5
  bslib:
    base_font: {google: "Roboto"}
    heading_font: {google: "Roboto Slab"}
    code_font: {google: "JetBrains Mono"}

reference:
- title: Data Generation Functions
  contents:
  - has_concept("Data Generation Functions")
